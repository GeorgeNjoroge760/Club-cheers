<div class="d-flex justify-content-between align-items-center mb-2">
    <span class="text-dark small">Total:</span>
    <span class="fs-4 fw-bold text-warning cart-total">KES {{ "%.0f"|format(cart_total) }}</span>
</div>
<div class="mb-2">
    <select class="form-select form-select-lg" id="paymentMethod">
        <option value="cash"><i class="bi bi-cash"></i> Cash</option>
        <option value="card"><i class="bi bi-credit-card"></i> Card</option>
        <option value="mpesa"><i class="bi bi-phone"></i> M-Pesa</option>
    </select>
</div>
<div class="d-grid gap-2">
    <button class="btn btn-success btn-lg fw-bold" id="checkoutBtn" onclick="checkout()">
        <i class="bi bi-credit-card-2-front"></i> Charge
    </button>
</div>
