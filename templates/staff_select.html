{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center vh-100 p-4">
    <div class="text-center mb-5">
        <div class="display-1 text-warning mb-3">&#127866;</div>
        <h1 class="text-light display-4">Cheers Club</h1>
        <p class="text-secondary lead">Select attendant to start</p>
    </div>
    <div class="d-flex flex-wrap justify-content-center gap-4 w-100" style="max-width: 600px;">
        {% for s in staff %}
        <form method="POST" action="{{ url_for('auth.select_staff') }}" class="w-100" style="max-width: 250px;">
            <input type="hidden" name="staff_id" value="{{ s.id }}">
            <button type="submit" class="btn btn-staff w-100 py-4">
                <div class="fs-2">{{ s.name }}</div>
            </button>
        </form>
        {% endfor %}
    </div>
    <div class="mt-5">
        <a href="{{ url_for('auth.admin_login') }}" class="text-secondary small">Admin Login</a>
    </div>
</div>
{% endblock %}
