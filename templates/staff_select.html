{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center vh-100 p-4" style="background: #faf8f3;">
    <div class="text-center mb-5">
        <i class="bi bi-cup-straw text-warning" style="font-size: 5rem;"></i>
        <h1 class="mt-3 fw-bold" style="color: #166534;">Cheers Club</h1>
        <p class="text-secondary lead">Select attendant to start</p>
    </div>
    <div class="d-flex flex-column flex-sm-row flex-wrap justify-content-center gap-3 w-100" style="max-width: 600px;">
        {% for s in staff %}
        <form method="POST" action="{{ url_for('auth.select_staff') }}" class="flex-fill">
            <input type="hidden" name="staff_id" value="{{ s.id }}">
            <button type="submit" class="btn btn-staff w-100 py-4" style="border-color: #166534;">
                <div class="fs-2 fw-bold" style="color: #166534;">{{ s.name }}</div>
                <div class="small text-secondary"><i class="bi bi-person-badge"></i> Attendant</div>
            </button>
        </form>
        {% endfor %}
    </div>
    <div class="mt-5">
        <a href="{{ url_for('auth.admin_login') }}" class="btn btn-sm" style="border: 2px solid #166534; color: #166534; border-radius: 10px; padding: 8px 20px;">
            <i class="bi bi-shield-lock"></i> Admin Login
        </a>
    </div>
</div>
{% endblock %}
