{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center vh-100 p-4">
    <div class="card bg-dark border-secondary shadow" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-warning" style="font-size: 3rem;"></i>
                <h3 class="text-warning mt-2">Admin Login</h3>
            </div>
            {% if error %}
            <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person"></i> Username</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-dark text-light border-secondary" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-dark text-light border-secondary" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('auth.staff_select') }}" class="text-secondary small">
                    <i class="bi bi-arrow-left"></i> Back to staff selection
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
