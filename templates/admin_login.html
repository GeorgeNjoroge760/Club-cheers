{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center vh-100 p-4">
    <div class="card bg-dark border-secondary shadow" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4">
            <h3 class="card-title text-center text-warning mb-4">Admin Login</h3>
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('auth.staff_select') }}" class="text-secondary small">Back to staff selection</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
