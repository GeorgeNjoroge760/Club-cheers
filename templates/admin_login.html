{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center vh-100 p-4" style="background: #faf8f3;">
    <div class="card border-light shadow" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-cup-straw text-warning" style="font-size: 3rem;"></i>
                <h3 class="mt-2 fw-bold" style="color: #166534;">Cheers Club</h3>
                <p class="text-secondary small">Admin Login</p>
            </div>
            {% if error %}
            <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person"></i> Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="adminPassword" class="form-control form-control-lg" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()" style="border-color: #ced4da;">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-lg w-100 fw-bold text-light" style="background: #166534; border-color: #166534;">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('auth.staff_select') }}" class="text-secondary small">
                    <i class="bi bi-arrow-left"></i> Back to staff selection
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword() {
    var input = document.getElementById('adminPassword');
    var icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
{% endblock %}
