{% extends "base.html" %}
{% block content %}
<div class="container p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="text-dark mb-0"><i class="bi bi-people-fill text-warning"></i> Users</h4>
        <a href="{{ url_for('admin.staff_add') }}" class="btn btn-warning btn-sm fw-bold">
            <i class="bi bi-person-plus"></i> Add Staff
        </a>
    </div>
    <div class="card border-light">
        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in staff %}
                    <tr>
                        <td><i class="bi bi-person"></i> {{ s.name }}</td>
                        <td>
                            <span class="badge {% if s.role == 'admin' %}bg-warning text-dark{% else %}bg-info{% endif %}">
                                <i class="bi {% if s.role == 'admin' %}bi-shield-lock{% else %}bi-person-badge{% endif %}"></i>
                                {{ s.role }}
                            </span>
                        </td>
                        <td>
                            {% if s.active %}
                            <span class="text-success"><i class="bi bi-check-circle"></i> Active</span>
                            {% else %}
                            <span class="text-danger"><i class="bi bi-x-circle"></i> Inactive</span>
                            {% endif %}
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a href="{{ url_for('admin.staff_edit', staff_id=s.id) }}" class="btn btn-sm btn-outline-dark">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                {% if s.role != 'admin' %}
                                <form method="POST" action="{{ url_for('admin.staff_toggle', staff_id=s.id) }}" class="d-inline">
                                    <button type="submit" class="btn btn-sm {% if s.active %}btn-outline-danger{% else %}btn-outline-success{% endif %}">
                                        <i class="bi {% if s.active %}bi-pause-circle{% else %}bi-play-circle{% endif %}"></i>
                                    </button>
                                </form>
                                {% endif %}
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('admin.dashboard') }}" class="text-secondary">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
