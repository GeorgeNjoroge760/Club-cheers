{% extends "base.html" %}
{% block content %}
<div class="container p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="text-light mb-0">Staff Management</h4>
        <a href="{{ url_for('admin.staff_add') }}" class="btn btn-warning">+ Add Staff</a>
    </div>
    <div class="card bg-dark border-secondary">
        <div class="table-responsive">
            <table class="table table-dark table-striped mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in staff %}
                    <tr>
                        <td>{{ s.name }}</td>
                        <td><span class="badge {% if s.role == 'admin' %}bg-warning text-dark{% else %}bg-info{% endif %}">{{ s.role }}</span></td>
                        <td>{% if s.active %}<span class="text-success">Active{% else %}<span class="text-danger">Inactive{% endif %}</span></td>
                        <td>
                            <a href="{{ url_for('admin.staff_edit', staff_id=s.id) }}" class="btn btn-sm btn-outline-light">Edit</a>
                            {% if s.role != 'admin' %}
                            <form method="POST" action="{{ url_for('admin.staff_toggle', staff_id=s.id) }}" class="d-inline">
                                <button type="submit" class="btn btn-sm {% if s.active %}btn-outline-danger{% else %}btn-outline-success{% endif %}">
                                    {% if s.active %}Deactivate{% else %}Activate{% endif %}
                                </button>
                            </form>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('auth.logout') }}" class="text-secondary">Back</a>
    </div>
</div>
{% endblock %}
