{% extends "base.html" %}
{% block content %}
<div class="container p-3" style="max-width: 500px;">
    <h4 class="text-dark mb-3"><i class="bi bi-shield-lock-fill text-warning"></i> Change Password</h4>
    {% if error %}
    <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success py-2"><i class="bi bi-check-circle"></i> {{ success }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock"></i> Current Password</label>
            <input type="password" name="current_password" class="form-control " required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-key"></i> New Password</label>
            <input type="password" name="new_password" class="form-control " required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-key-fill"></i> Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control " required>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning fw-bold"><i class="bi bi-check-lg"></i> Update</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
