<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheers Club POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% if session.get('staff_name') %}
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
        <span class="navbar-brand mb-0 h1">
            <span class="text-warning">&#127866;</span> Cheers Club
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-light small">{{ session.get('staff_name') }}
                {% if session.get('role') == 'admin' %}
                <span class="badge bg-warning text-dark ms-1">Admin</span>
                {% endif %}
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>
    {% endif %}

    <main class="container-fluid p-0">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
